async function saveProject(id) {
  const name = document.getElementById('pName').value.trim();
  if (!name) { showToast('Project name is required'); return; }
  const payload = {
    catalog_id:           state.activeCatalogId,
    project_name:         name,
    project_number:       document.getElementById('pNum').value.trim() || null,
    status:               document.getElementById('pStatus').value,
    start_date:           document.getElementById('pStart').value || null,
    material_order_by:    document.getElementById('pOrderBy').value || null,
    owner_name:           document.getElementById('pOwner').value.trim() || null,
    owner_phone:          document.getElementById('pOwnerPhone').value.trim() || null,
    site_address:         document.getElementById('pAddr').value.trim() || null,
    general_contractor:   document.getElementById('pGC').value.trim() || null,
    project_manager:      document.getElementById('pPM').value.trim() || null,
    estimated_completion: document.getElementById('pDate').value || null,
    budget_reference:     document.getElementById('pBudget').value.trim() || null,
    notes:                document.getElementById('pNotes').value.trim() || null,
  };
  if (!id) payload.created_by = state.userId;
  const {data, error} = id
    ? await sb.from('projects').update(payload).eq('id',id).select().single()
    : await sb.from('projects').insert(payload).select().single();
  if (error) { showToast('Error saving project'); console.error(error); return; }
  closeModal();
  await loadProjects();
  if (!id) { state.activeProjectId = data.id; await loadBom(); switchRTab('bom'); }
  renderProjList();
  showToast(id ? 'Project updated' : `Project "${name}" created`);
}

function confirmDelProj() {
  const p = state.projects.find(x=>x.id===state.activeProjectId);
  if (!p) return;
  document.getElementById('modalWrap').innerHTML = `
  <div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>Delete project?</h3>
      <p class="modal-note">This will permanently remove <strong>${escapeHtml(p.project_name)}</strong> and all its BOM items. This cannot be undone.</p>
      <div class="modal-btns">
        <button onclick="closeModal()">Cancel</button>
        <button class="danger-btn" onclick="deleteProject('${p.id}')">Delete</button>
      </div>
    </div>
  </div>`;
}

async function deleteProject(id) {
  await sb.from('projects').delete().eq('id', id);
  state.activeProjectId = null;
  closeModal();
  await loadProjects();
  showToast('Project deleted');
}

// ── BOM ──────────────────────────────────────────────────────
async function loadBom() {
  if (!state.activeProjectId) { renderBom(); return; }
  const {data} = await sb.from('project_items')
    .select('*').eq('project_id', state.activeProjectId)
    .order('added_at', {ascending: true});
  state.activeProjItems = data || [];
  renderBom();
}

function renderBom() {
  const proj = state.projects.find(p=>p.id===state.activeProjectId);
  const el   = document.getElementById('bomItems');
  const showPricing = state.customer?.show_pricing !== false;

  // Header
  document.getElementById('bomProjName').textContent = proj?.project_name || 'No project selected';
  document.getElementById('bomProjMeta').textContent = proj
    ? [proj.project_number, proj.owner_name, proj.site_address].filter(Boolean).join(' · ') || statusLabel(proj.status)
    : 'Select a project from the Projects tab';
  document.getElementById('bomActions').style.display = proj ? 'flex' : 'none';
  document.getElementById('dlBtn').disabled = !proj || !state.activeProjItems.length;

  if (!proj) {
    el.innerHTML = `<div class="bom-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Select a project to view its BOM</p></div>`;
    document.getElementById('bomStats').innerHTML = '';
    return;
  }

  if (!state.activeProjItems.length) {
    el.innerHTML = `<div class="bom-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="4" y="10" width="16" height="4" rx="2"/>
        <rect x="6" y="5" width="12" height="6" rx="2"/>
        <line x1="7" y1="14" x2="7" y2="20"/><line x1="17" y1="14" x2="17" y2="20"/>
      </svg>
      <p>No items yet. Click a product to add it to this BOM.</p></div>`;
  } else {
    const xIco = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    el.innerHTML = state.activeProjItems.map(item => {
      const p     = state.products.find(x=>x.sku===item.sku);
      const img   = (p?.images||[])[0]||'';
      const price = item.unit_price;
      return `<div class="bom-item">
        <div class="bom-thumb">
          ${img ? `<img src="${escapeHtml(img)}" alt="${escapeHtml(item.product_name)}" onerror="this.style.display='none'">` : ''}
        </div>
        <div class="bom-info">
          <div class="bom-name" title="${escapeHtml(item.product_name)}">${escapeHtml(item.product_name)}</div>
          <div class="bom-sku">${escapeHtml(item.sku)}</div>
          ${showPricing && price ? `<div class="bom-price">$${price.toFixed(2)} / unit</div>` : ''}
          <div class="qty-row">
            <div class="qty-btn" onclick="changeQty('${item.id}',-1)">−</div>
            <span class="qty-val">${item.quantity}</span>
            <div class="qty-btn" onclick="changeQty('${item.id}',1)">+</div>
            <span class="qty-lbl">units</span>
            <button class="rm-btn" onclick="removeItem('${item.id}')">${xIco}</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // Stats
  const totalUnits = state.activeProjItems.reduce((s,i)=>s+i.quantity,0);
  const totalLines = state.activeProjItems.length;
  let totalPrice   = null;
  if (showPricing) {
    const sum = state.activeProjItems.reduce((s,i)=>s+(i.unit_price||0)*i.quantity,0);
    if (sum > 0) totalPrice = sum;
  }
  document.getElementById('bomStats').innerHTML = `
    <div class="stat-box"><div class="stat-val">${totalLines}</div><div class="stat-lbl">Products</div></div>
    <div class="stat-box"><div class="stat-val">${totalUnits}</div><div class="stat-lbl">Units</div></div>
    ${totalPrice ? `<div class="stat-box"><div class="stat-val">$${totalPrice.toLocaleString('en-CA',{minimumFractionDigits:0,maximumFractionDigits:0})}</div><div class="stat-lbl">Total</div></div>` : ''}`;
}

async function addToBom(sku) {
  if (!state.activeProjectId) {
    showToast('Please select or create a project first'); closeModal(); switchRTab('projects'); return;
  }
  const qty   = Math.max(1, parseInt(document.getElementById('detailQty')?.value||1));
  const prod  = state.products.find(p=>p.sku===sku);
  const price = getPrice(sku);
  // Check if already in BOM
  const existing = state.activeProjItems.find(i=>i.sku===sku);
  if (existing) {
    await sb.from('project_items').update({quantity: existing.quantity+qty}).eq('id',existing.id);
  } else {
    await sb.from('project_items').insert({
      project_id:   state.activeProjectId,
      sku,
      product_name: prod?.name || sku,
      quantity:     qty,
      unit_price:   price || null,
      added_by:     state.userId
    });
  }
  closeModal();
  await loadBom();
  setSyncStatus('saved');
  showToast(`Added to BOM`);
}

async function changeQty(itemId, delta) {
  const item = state.activeProjItems.find(i=>i.id===itemId);
  if (!item) return;
  const newQty = Math.max(1, item.quantity + delta);
  setSyncStatus('saving');
  await sb.from('project_items').update({quantity: newQty}).eq('id', itemId);
  await loadBom();
  setSyncStatus('saved');
}

async function removeItem(itemId) {
  setSyncStatus('saving');
  await sb.from('project_items').delete().eq('id', itemId);
  await loadBom();
  setSyncStatus('saved');
}

// ── SYNC INDICATOR ───────────────────────────────────────────
function setSyncStatus(s) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLbl');
  if (s==='saving') { dot.className='sync-dot saving'; lbl.textContent='Saving…'; }
  else if (s==='saved') { dot.className='sync-dot'; lbl.textContent='Saved to cloud'; }
  else { dot.className='sync-dot err'; lbl.textContent='Sync error'; }
}

// ── DOWNLOAD BOM ─────────────────────────────────────────────
function openDownload() {
  const proj     = state.projects.find(p=>p.id===state.activeProjectId);
  const items    = state.activeProjItems;
  if (!proj || !items.length) return;
  const today    = new Date().toLocaleDateString('en-CA');
  const showPrice = state.customer?.show_pricing !== false;
  const totalUnits = items.reduce((s,i)=>s+i.quantity,0);
  const totalPrice = showPrice ? items.reduce((s,i)=>s+(i.unit_price||0)*i.quantity,0) : 0;
  const fmtDate = d => d ? new Date(d).toLocaleDateString('en-CA') : '';
  const rows = items.map(item => `
    <tr>
      <td style="font-family:monospace;font-size:11px">${escapeHtml(item.sku)}</td>
      <td>${escapeHtml(item.product_name)}</td>
      <td style="text-align:center">${item.quantity}</td>
      ${showPrice ? `<td style="text-align:right">${item.unit_price ? '$'+item.unit_price.toFixed(2) : '—'}</td>
      <td style="text-align:right">${item.unit_price ? '$'+(item.unit_price*item.quantity).toFixed(2) : '—'}</td>` : ''}
    </tr>`).join('');
  const metaLine = [proj.project_number, proj.site_address, proj.general_contractor, proj.project_manager].filter(Boolean).join(' · ');
  const ownerLine = [
    proj.owner_name  ? `Owner: ${proj.owner_name}` : '',
    proj.owner_phone ? `Tel: ${proj.owner_phone}` : ''
  ].filter(Boolean).join(' · ');
  const dateLine = [
    `Status: ${statusLabel(proj.status)}`,
    proj.start_date        ? `Start: ${fmtDate(proj.start_date)}` : '',
    proj.material_order_by ? `Order materials by: ${fmtDate(proj.material_order_by)}` : '',
    proj.estimated_completion ? `Est. completion: ${fmtDate(proj.estimated_completion)}` : ''
  ].filter(Boolean).join(' · ');
  document.getElementById('modalWrap').innerHTML = `
  <div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal modal-xl">
      <div style="margin-bottom:20px">
        <div style="font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Project BOM</div>
        <div style="font-size:22px;font-weight:600;color:var(--txt)">${escapeHtml(proj.project_name)}</div>
        ${metaLine  ? `<div style="font-size:13px;color:var(--txt2);margin-top:4px">${escapeHtml(metaLine)}</div>` : ''}
        ${ownerLine ? `<div style="font-size:13px;color:var(--txt2);margin-top:2px">${escapeHtml(ownerLine)}</div>` : ''}
        ${dateLine  ? `<div style="font-size:12px;color:var(--txt2);margin-top:2px">${escapeHtml(dateLine)}</div>` : ''}
        <div style="font-size:12px;color:var(--txt3);margin-top:3px">Prepared: ${today} · ${escapeHtml(state.userEmail)}</div>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px">
        <thead>
          <tr style="background:var(--bg2)">
            <th style="text-align:left;padding:8px 10px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--txt3);border-bottom:.5px solid var(--bdr)">SKU</th>
            <th style="text-align:left;padding:8px 10px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--txt3);border-bottom:.5px solid var(--bdr)">Product</th>
            <th style="text-align:center;padding:8px 10px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--txt3);border-bottom:.5px solid var(--bdr)">Qty</th>
            ${showPrice ? `
            <th style="text-align:right;padding:8px 10px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--txt3);border-bottom:.5px solid var(--bdr)">Unit</th>
            <th style="text-align:right;padding:8px 10px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--txt3);border-bottom:.5px solid var(--bdr)">Total</th>` : ''}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr style="background:var(--bg2);font-weight:600;border-top:1px solid var(--bdr2)">
            <td colspan="2" style="padding:10px">Total</td>
            <td style="text-align:center;padding:10px">${totalUnits} units</td>
            ${showPrice && totalPrice ? `<td></td><td style="text-align:right;padding:10px">$${totalPrice.toLocaleString('en-CA',{minimumFractionDigits:2})}</td>` : ''}
          </tr>
        </tfoot>
      </table>
      ${proj.notes ? `<div style="font-size:12px;color:var(--txt3);padding:10px;background:var(--bg2);border-radius:var(--r);margin-bottom:14px">Notes: ${escapeHtml(proj.notes)}</div>` : ''}
      <div style="font-size:11px;color:var(--txt3);padding:10px;background:var(--bg2);border-radius:var(--r);margin-bottom:16px">
        This is a preliminary selection list. Pricing and availability to be confirmed. Product variants (colour, upholstery) to be specified at order stage.
        Contact: ${escapeHtml(state.customer?.contact_rep||'')} · ${escapeHtml(state.customer?.contact_email||'')}
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-secondary" onclick="copyBom()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy text
        </button>
        <button class="btn-secondary" onclick="window.print()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print / PDF
        </button>
        <button class="btn-secondary" onclick="exportCsv()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV
        </button>
        <button class="btn-close" onclick="closeModal()" style="margin-left:auto">Close</button>
      </div>
    </div>
  </div>`;
}

function copyBom() {
  const proj  = state.projects.find(p=>p.id===state.activeProjectId);
  const today = new Date().toLocaleDateString('en-CA');
  const showPrice = state.customer?.show_pricing !== false;
  const fmtDate = d => d ? new Date(d).toLocaleDateString('en-CA') : '';
  const lines = [
    `Project: ${proj.project_name}`,
    proj.project_number ? `Reference: ${proj.project_number}` : '',
    `Status: ${statusLabel(proj.status)}`,
    proj.owner_name ? `Owner: ${proj.owner_name}` : '',
    proj.owner_phone ? `Owner Phone: ${proj.owner_phone}` : '',
    proj.site_address ? `Address: ${proj.site_address}` : '',
    proj.start_date ? `Start Date: ${fmtDate(proj.start_date)}` : '',
    proj.material_order_by ? `Material Order-By: ${fmtDate(proj.material_order_by)}` : '',
    `Date: ${today}`, '',
    showPrice ? 'SKU | Product | Qty | Unit Price | Line Total'
              : 'SKU | Product | Qty',
    ...state.activeProjItems.map(i => showPrice
      ? `${i.sku} | ${i.product_name} | ${i.quantity} | ${i.unit_price?'$'+i.unit_price.toFixed(2):'—'} | ${i.unit_price?'$'+(i.unit_price*i.quantity).toFixed(2):'—'}`
      : `${i.sku} | ${i.product_name} | ${i.quantity}`)
  ].filter(l=>l!==null && l!=='' || l==='').join('\n');
  navigator.clipboard.writeText(lines).then(()=>showToast('Copied to clipboard'));
}

function exportCsv() {
  const proj  = state.projects.find(p=>p.id===state.activeProjectId);
  const showPrice = state.customer?.show_pricing !== false;
  const header = showPrice
    ? 'SKU,Product Name,Quantity,Unit Price,Line Total'
    : 'SKU,Product Name,Quantity';
  const rows = state.activeProjItems.map(i => showPrice
    ? `"${i.sku}","${i.product_name}",${i.quantity},${i.unit_price||''},${i.unit_price?i.unit_price*i.quantity:''}`
    : `"${i.sku}","${i.product_name}",${i.quantity}`);
  const csv   = [header,...rows].join('\n');
  const blob  = new Blob([csv],{type:'text/csv'});
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement('a');
  const slug  = proj.project_name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  a.href = url; a.download = `bom-${slug}-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast('CSV downloaded');
}

// ── UI HELPERS ───────────────────────────────────────────────
function switchRTab(t) {
  document.getElementById('panelProjects').classList.toggle('active', t==='projects');
  document.getElementById('panelBom').classList.toggle('active', t==='bom');
  document.getElementById('tabProj').classList.toggle('active', t==='projects');
  document.getElementById('tabBom').classList.toggle('active', t==='bom');
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent=msg; el.style.display='block'; el.style.opacity='1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.style.display='none',300);},2400);
}

// ── EVENT LISTENERS ──────────────────────────────────────────
document.getElementById('srchInput').addEventListener('input', e=>{
  state.search = e.target.value; renderProducts();
});
</script>
