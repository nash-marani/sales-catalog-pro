<!DOCTYPE html>
<html lang="en" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OFWD Seating Catalog</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeede9;
  --txt:#1a1a1a;--txt2:#555;--txt3:#999;
  --bdr:rgba(0,0,0,.10);--bdr2:rgba(0,0,0,.18);
  --acc:#326A95;--acc2:#285578;--accbg:#E8EFF5;--acctxt:#285578; /* Xenali Lapis Lazuli */
  --danger:#A32D2D;--success:#2E7D32;
  --r:8px;--rl:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
}
body{font-family:var(--font);background:var(--bg3);color:var(--txt);min-height:100vh;display:flex;flex-direction:column}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f5f5f3,#E8EFF5);padding:20px}
.auth-card{background:var(--bg);border-radius:var(--rl);border:.5px solid var(--bdr);padding:36px;width:380px;max-width:100%;box-shadow:0 8px 40px rgba(50,106,149,.12)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.auth-logo-img{height:40px;max-width:160px;object-fit:contain}
.auth-logo-text{font-size:16px;font-weight:600;color:var(--acc)}
.auth-title{font-size:20px;font-weight:500;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--txt2);margin-bottom:22px;line-height:1.5}
.auth-tabs{display:flex;border:.5px solid var(--bdr2);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;color:var(--txt2);background:var(--bg2);border:none;font-family:var(--font);transition:background .15s,color .15s}
.auth-tab.active{background:var(--acc);color:#fff}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--txt2);margin-bottom:4px}
.field input{width:100%;padding:9px 11px;font-size:14px;border:.5px solid var(--bdr2);border-radius:var(--r);background:var(--bg2);color:var(--txt);font-family:var(--font);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--acc)}
.btn-auth{width:100%;padding:11px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);transition:background .15s;margin-top:4px}
.btn-auth:hover{background:var(--acc2)}
.btn-auth:disabled{background:var(--bg2);color:var(--txt3);cursor:default}
.auth-msg{font-size:12px;margin-top:10px;padding:9px 11px;border-radius:var(--r);display:none}
.auth-msg.error{background:#FDECEA;color:var(--danger);display:block}
.auth-msg.success{background:#E8F5E9;color:var(--success);display:block}

/* ── CATALOG PICKER ── */
.picker-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f5f5f3,#E8EFF5);padding:20px}
.picker-card{background:var(--bg);border-radius:var(--rl);border:.5px solid var(--bdr);padding:32px;width:440px;max-width:100%;box-shadow:0 8px 40px rgba(50,106,149,.12)}
.picker-head{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.picker-logo{height:44px;max-width:150px;object-fit:contain}
.picker-title{font-size:19px;font-weight:600;color:var(--txt)}
.picker-sub{font-size:13px;color:var(--txt2);margin-top:2px}
.picker-list{display:flex;flex-direction:column;gap:9px}
.picker-item{display:flex;align-items:center;justify-content:space-between;width:100%;padding:15px 16px;border:.5px solid var(--bdr2);border-radius:var(--r);background:var(--bg2);color:var(--txt);font-family:var(--font);font-size:15px;font-weight:500;cursor:pointer;transition:background .15s,border-color .15s}
.picker-item:hover{background:var(--accbg);border-color:var(--acc);color:var(--acctxt)}
.picker-item svg{width:18px;height:18px;color:var(--txt3)}
.picker-item:hover svg{color:var(--acc)}

/* ── NAV CATALOG INDICATOR ── */
.nav-catalog{display:flex;align-items:center;gap:10px}
.nav-catalog-name{font-size:13px;font-weight:600;color:var(--acctxt);background:var(--accbg);padding:3px 10px;border-radius:10px;white-space:nowrap}

/* ── NAV ── */
.nav{display:flex;align-items:center;gap:14px;padding:0 20px;height:54px;background:var(--bg);border-bottom:.5px solid var(--bdr);flex-shrink:0;position:sticky;top:0;z-index:50}
.nav-brand{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
.nav-brand-logo{height:30px;width:auto;display:block}
.nav-cobrand{display:flex;align-items:center;gap:9px;min-width:0}
.nav-cobrand-lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--txt3);white-space:nowrap}
.nav-client-logo{height:26px;max-width:130px;object-fit:contain;display:block}
.nav-client-name{font-size:14px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-divider{width:1px;height:20px;background:var(--bdr)}
.nav-section{font-size:13px;color:var(--txt3)}
.nav-sp{flex:1}
.nav-user{font-size:12px;color:var(--txt2);display:flex;align-items:center;gap:8px}
.nav-role{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--accbg);color:var(--acctxt);font-weight:500}
.btn-sm-nav{font-size:12px;padding:5px 12px;border:.5px solid var(--bdr2);border-radius:6px;cursor:pointer;background:transparent;color:var(--txt2);font-family:var(--font);transition:background .1s}
.btn-sm-nav:hover{background:var(--bg2)}

/* ── APP LAYOUT ── */
.app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 54px)}

/* ── SIDEBAR ── */
.sidebar{width:220px;min-width:220px;background:var(--bg);border-right:.5px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.sidebar-section{padding:10px 14px 6px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3)}
.cat-list{overflow-y:auto;padding:4px 0}
.cat-item{padding:8px 14px;font-size:13px;cursor:pointer;color:var(--txt2);border-left:2px solid transparent;display:flex;align-items:center;justify-content:space-between;transition:background .1s;user-select:none;-webkit-user-select:none}
.cat-item:hover{background:var(--bg2);color:var(--txt)}
.cat-item.active{background:var(--bg2);color:var(--txt);font-weight:500;border-left-color:var(--acc)}
.cat-count{font-size:11px;color:var(--txt3);background:var(--bg2);padding:1px 6px;border-radius:10px}
.cat-item.active .cat-count{background:var(--bg)}
.sidebar-div{height:.5px;background:var(--bdr);margin:6px 0}
/* parent-group headers + nested subcategories */
.grp-head{display:flex;align-items:center;gap:6px;padding:9px 14px 5px;cursor:pointer;user-select:none;-webkit-user-select:none;color:var(--txt2);transition:color .1s}
.grp-head:hover{color:var(--txt)}
.grp-chev{width:12px;height:12px;flex-shrink:0;color:var(--acc);transition:transform .15s}
.grp-head:not(.collapsed) .grp-chev{transform:rotate(90deg)}
.grp-name{flex:1;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--acc)}
.grp-count{font-size:10px;color:var(--txt3)}
.cat-sub{padding-left:30px}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg2)}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg);border-bottom:.5px solid var(--bdr);flex-shrink:0}
.topbar-title{font-size:13px;font-weight:500;color:var(--txt2);min-width:90px}
.srch{flex:1;position:relative}
.srch svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--txt3);pointer-events:none}
.srch input{width:100%;padding:7px 10px 7px 30px;font-size:13px;border:.5px solid var(--bdr);border-radius:var(--r);background:var(--bg2);color:var(--txt);font-family:var(--font);outline:none;transition:border-color .15s}
.srch input:focus{border-color:var(--acc)}
.srch input::placeholder{color:var(--txt3)}
.result-ct{font-size:12px;color:var(--txt3);white-space:nowrap}
.products-grid{flex:1;overflow-y:auto;padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;align-content:start}

/* ── PRODUCT CARD ── */
.prod-card{background:var(--bg);border:.5px solid var(--bdr);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:border-color .15s,transform .1s}
.prod-card:hover{border-color:var(--acc);transform:translateY(-1px)}
.card-img{height:130px;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-img .no-img{color:var(--txt3)}
.card-img .no-img svg{width:36px;height:36px}
.card-ext{position:absolute;top:7px;right:7px;width:26px;height:26px;background:rgba(255,255,255,.92);border-radius:6px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;color:var(--acc);text-decoration:none}
.card-ext svg{width:13px;height:13px}
.prod-card:hover .card-ext{opacity:1}
.card-body{padding:10px 12px 12px}
.card-sku{font-size:10px;color:var(--txt3);font-family:var(--mono);margin-bottom:3px}
.card-name{font-size:12px;font-weight:500;color:var(--txt);line-height:1.4;margin-bottom:6px}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-cat{font-size:10px;color:var(--acctxt);background:var(--accbg);padding:2px 7px;border-radius:10px}
.card-price{font-size:12px;font-weight:600;color:var(--txt)}
.card-price-cfp{font-weight:500;color:var(--txt3)}
.no-results{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;padding:60px 20px;color:var(--txt3);gap:10px;text-align:center;font-size:14px}

/* ── RIGHT PANEL — PROJECTS ── */
.rpanel{width:300px;min-width:300px;background:var(--bg);border-left:.5px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.rp-tabs{display:flex;border-bottom:.5px solid var(--bdr);flex-shrink:0}
.rp-tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:500;cursor:pointer;color:var(--txt3);border-bottom:2px solid transparent;transition:color .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.rp-tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.rp-panel{flex:1;overflow-y:auto;display:none;flex-direction:column}
.rp-panel.active{display:flex}

/* Projects list panel */
.proj-toolbar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:.5px solid var(--bdr);flex-shrink:0}
.proj-srch{flex:1;position:relative}
.proj-srch svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--txt3);pointer-events:none}
.proj-srch input{width:100%;padding:6px 8px 6px 27px;font-size:12px;border:.5px solid var(--bdr);border-radius:var(--r);background:var(--bg2);color:var(--txt);font-family:var(--font);outline:none}
.proj-srch input:focus{border-color:var(--acc)}
.btn-icon{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:.5px solid var(--bdr2);border-radius:var(--r);cursor:pointer;background:var(--bg2);color:var(--txt2);transition:background .1s;flex-shrink:0}
.btn-icon:hover{background:var(--bg3);color:var(--txt)}
.btn-icon svg{width:14px;height:14px}
.proj-list{flex:1;overflow-y:auto;padding:8px}
.proj-card{padding:10px 12px;border:.5px solid var(--bdr);border-radius:var(--r);margin-bottom:7px;cursor:pointer;transition:border-color .15s,background .1s;background:var(--bg)}
.proj-card:hover{border-color:var(--acc);background:var(--bg2)}
.proj-card.active-proj{border-color:var(--acc);background:var(--accbg)}
.proj-card-name{font-size:13px;font-weight:500;color:var(--txt);margin-bottom:3px}
.proj-card-meta{font-size:11px;color:var(--txt3);display:flex;gap:10px;flex-wrap:wrap}
.status-pill{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.status-budget{background:#FFF8E1;color:#F57F17}
.status-financial_negotiation{background:#E3F2FD;color:#1565C0}
.status-engineering_design{background:#E8EFF5;color:#285578}
.status-ready_manufacture{background:#E8F5E9;color:#2E7D32}
.proj-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--txt3);text-align:center;gap:8px}
.proj-empty svg{width:36px;height:36px;opacity:.3}
.proj-empty p{font-size:13px;line-height:1.5}

/* BOM panel */
.bom-header{padding:10px 12px;border-bottom:.5px solid var(--bdr);flex-shrink:0}
.bom-proj-name{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:2px}
.bom-proj-meta{font-size:11px;color:var(--txt3)}
.bom-actions{display:flex;gap:6px;margin-top:8px}
.bom-items{flex:1;overflow-y:auto;padding:8px}
.bom-item{display:flex;align-items:flex-start;gap:8px;padding:8px;border-radius:var(--r);border:.5px solid var(--bdr);margin-bottom:7px;background:var(--bg2)}
.bom-thumb{width:42px;height:42px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--txt3)}
.bom-thumb img{width:100%;height:100%;object-fit:cover}
.bom-thumb svg{width:18px;height:18px}
.bom-info{flex:1;min-width:0}
.bom-name{font-size:12px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bom-sku{font-size:10px;color:var(--txt3);font-family:var(--mono)}
.bom-price{font-size:11px;color:var(--txt2);margin-top:2px}
.qty-row{display:flex;align-items:center;gap:5px;margin-top:5px}
.qty-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:.5px solid var(--bdr2);border-radius:5px;cursor:pointer;font-size:14px;color:var(--txt2);background:var(--bg);user-select:none;-webkit-user-select:none}
.qty-btn:hover{background:var(--bg2)}
.qty-val{font-size:13px;font-weight:500;min-width:22px;text-align:center}
.qty-lbl{font-size:11px;color:var(--txt3)}
.rm-btn{margin-left:auto;color:var(--txt3);cursor:pointer;background:none;border:none;display:flex;align-items:center;padding:2px;border-radius:4px}
.rm-btn:hover{color:var(--danger)}
.rm-btn svg{width:13px;height:13px}
.bom-footer{padding:10px 12px;border-top:.5px solid var(--bdr);flex-shrink:0}
.bom-stats{display:flex;gap:8px;margin-bottom:8px}
.stat-box{flex:1;background:var(--bg2);border-radius:var(--r);padding:7px 10px;text-align:center}
.stat-val{font-size:18px;font-weight:600;color:var(--txt)}
.stat-lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.04em}
.bom-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--txt3);text-align:center;padding:20px;gap:8px}
.bom-empty svg{width:32px;height:32px;opacity:.3}
.bom-empty p{font-size:13px;line-height:1.5}

/* ── BUTTONS ── */
.btn-primary{width:100%;padding:9px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--font);transition:background .15s}
.btn-primary:hover{background:var(--acc2)}
.btn-primary:disabled{background:var(--bg2);color:var(--txt3);cursor:default}
.btn-primary svg{width:14px;height:14px}
.btn-secondary{padding:7px 12px;border:.5px solid var(--bdr2);border-radius:var(--r);font-size:12px;cursor:pointer;background:var(--bg2);color:var(--txt2);font-family:var(--font);display:inline-flex;align-items:center;gap:5px;transition:background .1s}
.btn-secondary:hover{background:var(--bg3)}
.btn-secondary svg{width:13px;height:13px}
.btn-danger{padding:9px;background:var(--danger);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)}
.btn-accent{padding:7px 12px;background:var(--accbg);color:var(--acctxt);border:.5px solid transparent;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:5px;text-decoration:none;transition:background .15s}
.btn-accent:hover{background:var(--acc);color:#fff}
.btn-accent svg{width:13px;height:13px}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--bg);border-radius:var(--rl);border:.5px solid var(--bdr);padding:22px;width:420px;max-width:100%}
.modal-lg{width:600px}
.modal-xl{width:740px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:500;margin-bottom:16px;color:var(--txt)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mfield{margin-bottom:0}
.mfield label{display:block;font-size:11px;font-weight:500;color:var(--txt2);margin-bottom:4px}
.mfield input,.mfield select,.mfield textarea{width:100%;padding:8px 10px;font-size:13px;border:.5px solid var(--bdr2);border-radius:var(--r);background:var(--bg2);color:var(--txt);font-family:var(--font);outline:none;transition:border-color .15s}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{border-color:var(--acc)}
.mfield textarea{resize:vertical;min-height:70px}
.mfield-full{grid-column:1/-1}
.modal-note{font-size:13px;color:var(--txt2);margin-bottom:14px;line-height:1.5}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns button{flex:1;padding:9px;border-radius:var(--r);font-size:13px;cursor:pointer;border:.5px solid var(--bdr2);background:var(--bg2);color:var(--txt);font-family:var(--font)}
.modal-btns .confirm{background:var(--acc);color:#fff;border-color:var(--acc)}
.modal-btns .confirm:hover{background:var(--acc2)}
.modal-btns .danger-btn{background:var(--danger);color:#fff;border-color:var(--danger)}

/* ── PRODUCT DETAIL MODAL ── */
.detail-wrap{display:flex;gap:20px}
.detail-gallery{width:260px;flex-shrink:0}
.detail-main-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--r);border:.5px solid var(--bdr);margin-bottom:8px}
.detail-thumbs{display:flex;gap:6px;flex-wrap:wrap}
.detail-thumb{width:52px;height:52px;object-fit:cover;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:border-color .15s}
.detail-thumb.active{border-color:var(--acc)}
.detail-thumb:hover{border-color:var(--acc)}
.detail-info{flex:1;min-width:0}
.detail-sku{font-size:11px;color:var(--txt3);font-family:var(--mono);margin-bottom:4px}
.detail-name{font-size:18px;font-weight:500;color:var(--txt);margin-bottom:10px;line-height:1.35}
.detail-cats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.cat-badge{font-size:10px;padding:3px 8px;border-radius:10px;background:var(--accbg);color:var(--acctxt);font-weight:500}
.bifma-badge{font-size:10px;padding:3px 8px;border-radius:10px;background:#E8F5E9;color:#2E7D32;font-weight:500}
.detail-desc{font-size:13px;color:var(--txt2);line-height:1.65;margin-bottom:12px}
.detail-specs{margin-bottom:14px}
.detail-specs h4{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:8px}
.spec-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.spec-list li{font-size:12px;color:var(--txt2);display:flex;align-items:flex-start;gap:7px}
.spec-list li::before{content:"\2713";color:var(--acc);font-weight:600;flex-shrink:0;margin-top:1px}
.detail-price{font-size:22px;font-weight:700;color:var(--txt);margin-bottom:14px}
.detail-price span{font-size:13px;color:var(--txt3);font-weight:400}
.detail-price.detail-price-cfp{font-size:16px;font-weight:600;color:var(--txt2)}
.detail-add{display:flex;align-items:center;gap:8px;padding-top:14px;border-top:.5px solid var(--bdr)}
.qty-input-wrap{display:flex;align-items:center;gap:6px}
.qty-input-wrap label{font-size:12px;color:var(--txt2)}
.qty-input-wrap input{width:60px;padding:8px;border:.5px solid var(--bdr2);border-radius:var(--r);font-size:14px;text-align:center;background:var(--bg2);color:var(--txt);font-family:var(--font);outline:none}
.qty-input-wrap input:focus{border-color:var(--acc)}
.btn-add{flex:1;padding:10px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:background .15s}
.btn-add:hover{background:var(--acc2)}
.btn-close{padding:10px 14px;border:.5px solid var(--bdr2);border-radius:var(--r);font-size:13px;cursor:pointer;background:var(--bg2);color:var(--txt2);font-family:var(--font)}

/* ── DETAIL RESOURCES (downloads) — added ── */
.detail-resources{margin:0 0 14px;padding-top:14px;border-top:.5px solid var(--bdr)}
.detail-resources h4{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:8px}
.res-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.res-link{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--acctxt);text-decoration:none;padding:7px 10px;border:.5px solid var(--bdr);border-radius:var(--r);background:var(--bg2);transition:background .12s,border-color .12s}
.res-link:hover{background:var(--accbg);border-color:var(--acc)}
.res-link svg{flex-shrink:0;color:var(--acc)}
.res-type{margin-left:auto;font-size:10px;color:var(--txt3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em}
/* file-count chip on product cards */
.card-files{position:absolute;bottom:7px;left:7px;display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.92);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:600;color:var(--acctxt)}
.card-files svg{width:11px;height:11px}

/* ── CATEGORY LANDING (added) ── */
.products-grid.cat-grid{grid-template-columns:repeat(auto-fill,minmax(244px,1fr));gap:12px;padding:18px 14px}
.cat-card{display:flex;align-items:center;gap:14px;background:var(--bg);border:.5px solid var(--bdr);border-radius:var(--rl);padding:15px 16px;cursor:pointer;transition:border-color .15s,transform .1s,box-shadow .15s;text-align:left}
.cat-card:hover{border-color:var(--acc);transform:translateY(-1px);box-shadow:0 6px 20px rgba(50,106,149,.10)}
.cat-card:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
.cat-card-icon{width:46px;height:46px;border-radius:11px;background:var(--accbg);color:var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cat-card-icon svg{width:23px;height:23px}
.cat-card-body{flex:1;min-width:0}
.cat-card-name{font-size:14px;font-weight:600;color:var(--txt);line-height:1.3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-card-count{font-size:12px;color:var(--txt3)}
.cat-card-arrow{color:var(--txt3);flex-shrink:0;display:flex;transition:transform .15s,color .15s}
.cat-card-arrow svg{width:18px;height:18px}
.cat-card:hover .cat-card-arrow{color:var(--acc);transform:translateX(2px)}
.cat-card-all{background:linear-gradient(135deg,var(--accbg),#fff);border-color:rgba(50,106,149,.35)}
.cat-card-all .cat-card-icon{background:var(--acc);color:#fff}
.cat-landing-head{grid-column:1/-1;display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:2px 2px 4px}
.cat-landing-title{font-size:15px;font-weight:600;color:var(--txt)}
.cat-landing-sub{font-size:12px;color:var(--txt3)}
/* breadcrumb back link */
.crumb-back{display:inline-flex;align-items:center;gap:5px;background:none;border:none;color:var(--acc);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);padding:5px 8px;border-radius:6px;transition:background .12s;flex-shrink:0}
.crumb-back:hover{background:var(--accbg)}
.crumb-back svg{width:14px;height:14px}

/* ── SYNC INDICATOR ── */
.sync-bar{display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:.5px solid var(--bdr);background:var(--bg2);flex-shrink:0}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4CAF50;flex-shrink:0;transition:background .3s}
.sync-dot.saving{background:#FFC107}
.sync-dot.err{background:var(--danger)}
.sync-lbl{font-size:11px;color:var(--txt3)}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--acc);color:#fff;padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:500;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(50,106,149,.35);transition:opacity .3s}

/* ── STATUS FILTER ── */
.status-filter{display:flex;gap:5px;padding:8px 12px;border-bottom:.5px solid var(--bdr);flex-shrink:0;flex-wrap:wrap}
.sf-btn{font-size:11px;padding:3px 9px;border-radius:10px;border:.5px solid var(--bdr2);background:var(--bg2);color:var(--txt3);cursor:pointer;font-family:var(--font);transition:background .1s}
.sf-btn.active{background:var(--acc);color:#fff;border-color:var(--acc)}

/* ── LOADING ── */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--txt3)}
.spinner{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media print{
  .nav,.sidebar,.topbar,.products-grid,.rpanel{display:none!important}
  .overlay{position:static!important;background:none!important}
  .modal-xl{width:100%!important;max-height:none!important;box-shadow:none!important;border:none!important;padding:0!important}
  .modal-btns,.btn-secondary,.btn-primary{display:none!important}
}
</style>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const SUPABASE_URL = 'https://qaecdgtqmleilkclrpyk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iUwwJShUMJRjyD1If6DT4w_ezlK9bYc';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// Customer config — loaded from URL param or defaults to 'ofwd'
const CUSTOMER_ID = new URLSearchParams(window.location.search).get('customer') || 'ofwd';

// Sentinel "view" for the category-first landing (grid of category cards).
// It is not a real category — renderProducts() treats it specially.
const HOME_VIEW = '__home__';
// Prefix marking a "category (group) view" — the right-hand landing shows only the
// parent categories; clicking one shows all of that category's products. The left
// rail still carries the full categories + subcategories tree.
const GROUP_PREFIX = 'group:';
// 'group:<G>'    → drill-down view: the subcategory cards inside parent category G
// 'groupall:<G>' → flat view: every product across all of G's subcategories
const GROUPALL_PREFIX = 'groupall:';

// Master switch for the "view product page" / "Full details" link-outs that send
// users to the manufacturer's site (ASI, Bobrick, etc.). Set to false to keep
// everyone inside the catalog — the card's external-link icon and the detail
// modal's "Full details" button are hidden. Flip to true to bring them back.
const SHOW_EXTERNAL_LINKS = true;

// Project status stages — single source of truth (value, label)
const STATUS_OPTIONS = [
  ['budget',                 'At Budget Stage'],
  ['financial_negotiation',  'At Financial Negotiation'],
  ['engineering_design',     'At Engineering & Design'],
  ['ready_manufacture',      'Ready for Manufacture']
];
const STATUS_LABELS = Object.fromEntries(STATUS_OPTIONS);
const DEFAULT_STATUS = 'budget';
function statusLabel(s) { return STATUS_LABELS[s] || (s || '').replace(/_/g, ' '); }

// ── SMALL HELPERS (added) ────────────────────────────────────
// Escape a string before putting it into innerHTML or an attribute.
function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
// Friendly fallback label when an asset row has no `label` value.
function assetLabel(a){return a && a.label ? a.label : ({brochure:'Technical Data Sheet',bim:'BIM Object',cad:'CAD Drawing'}[a&&a.asset_type] || 'Download');}
// True if a product page URL points at the Bobrick storefront — we must NOT
// navigate the main window there; downloads still open in a new tab.
function isBobrickPage(url){return !!url && /bobrick\.com/i.test(url);}

// Remember which catalog the user is in for THIS browser-tab session, so a page
// reload — or coming back from an external "Full details" link — returns them to
// the product grid instead of the catalog picker. Session-scoped, so a brand-new
// visit still shows the picker for multi-catalog customers. Wrapped in try/catch
// so it degrades quietly if storage is unavailable.
function lastCatKey(){ return 'ofwd:lastCatalog:' + (state.customerId || 'anon'); }
function saveLastCatalog(id){ try{ sessionStorage.setItem(lastCatKey(), id); }catch(e){} }
function getLastCatalog(){ try{ return sessionStorage.getItem(lastCatKey()); }catch(e){ return null; } }

function switchTab(t) {
  document.getElementById('siForm').style.display = t==='si'?'block':'none';
  document.getElementById('suForm').style.display = t==='su'?'block':'none';
  document.getElementById('tabSI').classList.toggle('active', t==='si');
  document.getElementById('tabSU').classList.toggle('active', t==='su');

async function signIn() {
  const email = document.getElementById('siEmail').value.trim();
  const pwd   = document.getElementById('siPwd').value;
  const msg   = document.getElementById('siMsg');
  const btn   = document.getElementById('siBtn');
  msg.className='auth-msg'; msg.style.display='none';
  btn.disabled=true; btn.textContent='Signing in…';
  const {error} = await sb.auth.signInWithPassword({email, password: pwd});
  btn.disabled=false; btn.textContent='Sign In';
  if (error) { msg.textContent=error.message; msg.className='auth-msg error'; }
}

async function signUp() {
  const name  = document.getElementById('suName').value.trim();
  const email = document.getElementById('suEmail').value.trim();
  const pwd   = document.getElementById('suPwd').value;
  const msg   = document.getElementById('suMsg');
  const btn   = document.getElementById('suBtn');
  msg.className='auth-msg'; msg.style.display='none';
  if (!name) { msg.textContent='Please enter your name.'; msg.className='auth-msg error'; return; }
  btn.disabled=true; btn.textContent='Creating account…';
  const {error} = await sb.auth.signUp({email, password: pwd, options:{data:{full_name:name}}});
  btn.disabled=false; btn.textContent='Create Account';
  if (error) { msg.textContent=error.message; msg.className='auth-msg error'; }
  else { msg.textContent='Account created! Check your email to confirm, then sign in.'; msg.className='auth-msg success'; }
}

async function signOut() {
  clearLastCatalog();
  await sb.auth.signOut();
  location.reload();
}

// ── BOOTSTRAP ────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    state.userId    = session.user.id;
    state.userEmail = session.user.email;
    document.getElementById('authWrap').style.display = 'none';
    await bootstrap();   // bootstrap shows either the catalog picker or the app
  } else {
    document.getElementById('authWrap').style.display = 'flex';
    document.getElementById('appWrap').style.display  = 'none';
    document.getElementById('pickerWrap').style.display = 'none';
  }
});

// Wrap a promise so it rejects if it hasn't settled in `ms` milliseconds.
function withTimeout(p, ms, label) {
  return Promise.race([
    p,
    new Promise((_, rej) => setTimeout(() =>
      rej(new Error((label || 'Request') + ' timed out')), ms))
  ]);
}

async function bootstrap() {
  try {
    // 1. Resolve which customer this login belongs to (via customer_users)
    const {data: cu, error: cuErr} = await withTimeout(
      sb.from('customer_users')
        .select('role, full_name, customer_id, customers(*)')
        .eq('user_id', state.userId).single(),
      10000, 'Loading account');
    if (cuErr) console.warn('customer_users:', cuErr.message);
    if (!cu || !cu.customers) {
      showFatal('Your login isn’t linked to a customer yet. Contact your administrator.');
      return;
    }
    state.customer   = cu.customers;
    state.customerId = cu.customers.id;
    state.userRole   = cu.role;
    applyBranding(cu.customers, cu.full_name || state.userEmail, cu.role);

    // 2. Products are no longer loaded globally from master_products.json.
    //    Each catalog now loads its RESOLVED products from the database view
    //    catalog_effective_products (master -> template -> catalog overrides),
    //    handled in loadCatalogProducts() when a catalog is selected.

    // 3. Customer-level pricing (current price per SKU, from the view)
    try {
      const {data: prices, error: pErr} = await withTimeout(
        sb.from('customer_current_pricing')
          .select('sku, unit_price')
          .eq('customer_id', state.customerId),
        10000, 'Loading pricing');
      if (pErr) throw pErr;
      state.pricing = {};
      (prices || []).forEach(p => { state.pricing[p.sku] = Number(p.unit_price); });
    } catch(e) { console.warn('pricing:', e.message); state.pricing = {}; }

    // 4. The customer's catalogs (business lines)
    const {data: cats, error: catErr} = await withTimeout(
      sb.from('catalogs')
        .select('*')
        .eq('customer_id', state.customerId)
        .order('sort_order', {ascending: true}),
      10000, 'Loading catalogs');
    if (catErr) throw catErr;
    state.catalogs = cats || [];

    // 5. Route: no catalogs → error. Otherwise, if the user was already in a
    //    catalog this tab session, restore it (so reloads / returning from an
    //    external link land on the product grid, not the picker). Else: a single
    //    catalog goes straight in; multiple shows the picker.
    if (state.catalogs.length === 0) {
      showFatal('No catalogs are set up for your customer yet.');
      return;
    }
    const savedId  = getLastCatalog();
    const savedCat = savedId && state.catalogs.find(c => c.id === savedId);
    if (savedCat) {
      selectCatalog(savedCat);
    } else if (state.catalogs.length === 1) {
      selectCatalog(state.catalogs[0]);
    } else {
      showCatalogPicker();
    }
  } catch(err) {
    console.error('Bootstrap failed:', err);
    showFatal('Couldn’t load your account: ' + err.message);
  }
}

// Show the catalog chooser (full-screen)
function showCatalogPicker() {
  clearLastCatalog();   // showing the picker means no catalog is actively selected
  document.getElementById('appWrap').style.display    = 'none';
  document.getElementById('authWrap').style.display   = 'none';
  const wrap = document.getElementById('pickerWrap');
  wrap.style.display = 'flex';

  const logo = document.getElementById('pickerLogo');
  if (state.customer?.logo_url) {
    logo.onerror = () => { logo.style.display = 'none'; };
    logo.src = state.customer.logo_url; logo.style.display = 'block';
  } else { logo.style.display = 'none'; }
  document.getElementById('pickerTitle').textContent =
    state.customer?.company_name || 'Choose a catalog';
  document.getElementById('pickerSub').textContent = 'Select which catalog to work in.';

  document.getElementById('pickerList').innerHTML = state.catalogs.map(c => `
    <button class="picker-item" onclick="selectCatalogById('${c.id}')">
      <span class="picker-item-name">${escapeHtml(c.name)}</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>`).join('');
}

function selectCatalogById(id) {
  const cat = state.catalogs.find(c => c.id === id);
  if (cat) selectCatalog(cat);
}

// Enter a catalog: apply its SKU scoping, load its projects, show the app
async function selectCatalog(cat) {
  state.activeCatalog   = cat;
  state.activeCatalogId = cat.id;
  saveLastCatalog(cat.id);   // remember for this tab session (restored in bootstrap)
  // Resolution (subset/rename/curation) is done server-side by the view,
  // so no client-side scoping is needed — show everything the view returns.
  state.catalog = { show_all: true, included_skus: [], excluded_skus: [] };
  state.activeCat = HOME_VIEW;   // open on the category landing, not a flat product dump
  state.search = '';
  // NOTE (Model A): we intentionally do NOT clear state.activeProjectId here.
  // A project spans catalogs, so switching catalogs keeps the same project/BOM
  // open — letting the user browse another catalog and keep adding to it.

  // Header: show which catalog we're in
  document.getElementById('navCatalogName').textContent = cat.name;
  document.getElementById('navCatalog').style.display =
    state.catalogs.length > 1 ? 'flex' : 'none';
  const si = document.getElementById('srchInput'); if (si) si.value = '';

  document.getElementById('pickerWrap').style.display = 'none';
  document.getElementById('appWrap').style.display    = 'flex';

  document.getElementById('prodGrid').innerHTML =
    '<div class="loading-wrap"><div class="spinner"></div><span>Loading catalog…</span></div>';

  // Load this catalog's RESOLVED products from the view, then its projects
  try {
    await withTimeout(loadCatalogProducts(cat.id), 12000, 'Loading products');
  } catch(e) {
    console.error('catalog products:', e.message);
    state.products = []; state.CAT_ORDER = []; state.CAT_SKU_SEQ = {};
  }
  try {
    await withTimeout(loadProjects(), 10000, 'Loading projects');
  } catch(e) { console.warn('projects:', e.message); state.projects = []; }

  renderCats();
  renderProducts();
  renderProjList();
}

// Load the resolved product set for one catalog and rebuild the in-memory
// shapes the renderers expect (state.products / CAT_ORDER / CAT_SKU_SEQ).
async function loadCatalogProducts(catalogId) {
  const { data, error } = await sb
    .from('catalog_effective_products')
    .select('sku,product_name,images,url,description_short,specs,bifma,category_slug,category_label,group_label,category_sort,product_sort')
    .eq('catalog_id', catalogId)
    .order('category_sort', { ascending: true })
    .order('product_sort',  { ascending: true })
    .limit(5000);
  if (error) throw error;
  const rows = data || [];

  const prodMap = new Map();   // sku -> product object (deduped across categories)
  const catOrder = [];         // effective category labels, in order
  const catSeen  = new Set();
  const catSku   = {};         // category label -> ordered, deduped sku list
  const catGroup = {};         // category label -> parent group label
  const groupOrder = [];       // parent group labels, in first-seen order
  const groupSeen  = new Set();

  for (const r of rows) {
    const label = r.category_label;
    const grp   = r.group_label || 'Other';   // every category has a parent via the view; 'Other' is a defensive fallback
    if (!catSeen.has(label)) { catSeen.add(label); catOrder.push(label); catSku[label] = []; catGroup[label] = grp; }
    if (!groupSeen.has(grp)) { groupSeen.add(grp); groupOrder.push(grp); }
    if (!catSku[label].includes(r.sku)) catSku[label].push(r.sku);
    if (!prodMap.has(r.sku)) {
      prodMap.set(r.sku, {
        sku: r.sku, name: r.product_name,
        images: r.images || [], url: r.url,
        description_short: r.description_short,
        specs: r.specs || [], bifma: r.bifma,
        categories: [label]
      });
    } else {
      const p = prodMap.get(r.sku);
      if (!p.categories.includes(label)) p.categories.push(label);
    }
  }
  state.products    = Array.from(prodMap.values());
  state.CAT_ORDER   = catOrder;
  state.CAT_SKU_SEQ = catSku;
  state.CAT_GROUP   = catGroup;
  state.GROUP_ORDER = groupOrder;

  // ── Downloadable assets (added) ────────────────────────────
  // The view exposes only `sku`, but product_assets joins on products.id.
  // Bridge sku -> id, then prefetch brochure/bim/cad assets for this catalog's
  // products in one query so cards can show a file count and the detail modal
  // can list Resources without a per-open round-trip. (.in() lists are fine for
  // catalogs of this size; revisit if a catalog ever returns thousands of rows.)
  state.products.forEach(p => { p._assets = []; p._pid = null; });
  try {
    const skus = state.products.map(p => p.sku).filter(Boolean);
    if (skus.length) {
      const { data: idRows } = await sb.from('products').select('id,sku').in('sku', skus);
      const idBySku = {};
      (idRows || []).forEach(r => { idBySku[r.sku] = r.id; });
      state.products.forEach(p => { p._pid = idBySku[p.sku] || null; });

      const pids = state.products.map(p => p._pid).filter(Boolean);
      if (pids.length) {
        const { data: assetRows } = await sb.from('product_assets')
          .select('product_id,asset_type,url,label,sort_order')
          .in('product_id', pids)
          .in('asset_type', ['brochure','bim','cad'])
          .order('sort_order', { ascending: true });
        const byPid = {};
        (assetRows || []).forEach(a => { (byPid[a.product_id] = byPid[a.product_id] || []).push(a); });
        state.products.forEach(p => { if (p._pid && byPid[p._pid]) p._assets = byPid[p._pid]; });
      }
    }
  } catch (e) { console.warn('asset prefetch:', e.message); }
}

// Full-screen fatal message (replaces the product grid / picker)
function showFatal(msg) {
  document.getElementById('authWrap').style.display  = 'none';
  document.getElementById('pickerWrap').style.display = 'none';
  document.getElementById('appWrap').style.display   = 'flex';
  document.getElementById('navCatalog').style.display = 'none';
  document.getElementById('prodGrid').innerHTML =
    `<div class="no-results">
       <span>${msg}</span>
       <button class="btn-secondary" style="margin-top:8px" onclick="signOut()">Sign out</button>
     </div>`;
}

function applyBranding(customer, displayName, role) {
  // User identity (always shown)
  document.getElementById('navUser').textContent = displayName || '';
  document.getElementById('navRole').textContent = role || '';
  if (!customer) return;

  // Co-brand lockup: the client's logo + name in the "Prepared for" slot.
  // (The Xenali wordmark is the fixed platform mark and is not changed here.)
  const name = customer.company_name || 'Project Builder';
  document.getElementById('navClientName').textContent = name;

  const logo = document.getElementById('navClientLogo');
  if (customer.logo_url) {
    logo.onerror = () => { logo.style.display = 'none'; }; // graceful fallback to name only
    logo.src = customer.logo_url;
    logo.alt = name;
    logo.style.display = 'block';
  } else {
    logo.style.display = 'none';
  }

  document.title = name + ' — Xenali Seating Catalog';

  // NOTE: the app accent stays Xenali blue regardless of customer, so the
  // platform reads as a Xenali product. Per-customer recolouring is intentionally
  // disabled. To re-enable it, uncomment the block below.
  // if (customer.primary_color) {
  //   document.documentElement.style.setProperty('--acc',  customer.primary_color);
  //   document.documentElement.style.setProperty('--acc2', customer.secondary_color || customer.primary_color);
  // }
}

// ── CATALOG FILTERING ────────────────────────────────────────
function getVisibleProducts() {
  if (!state.catalog || state.catalog.show_all) return state.products;
  const inc = new Set(state.catalog.included_skus || []);
  const exc = new Set(state.catalog.excluded_skus || []);
  return state.products.filter(p =>
    (inc.size === 0 || inc.has(p.sku)) && !exc.has(p.sku)
  );
}

function getProductsForCat(cat) {
  const visible = getVisibleProducts();
  if (cat === 'All Products') return visible;
  // Group view: every distinct product across that group's subcategories,
  // in the normal category order. Reached as 'groupall:<G>' (the All-<G> card)
  // or as 'group:<G>' while a search is active.
  if (cat.startsWith(GROUPALL_PREFIX) || cat.startsWith(GROUP_PREFIX)) {
    const group = cat.startsWith(GROUPALL_PREFIX)
      ? cat.slice(GROUPALL_PREFIX.length)
      : cat.slice(GROUP_PREFIX.length);
    const seen = new Set(); const out = [];
    state.CAT_ORDER.forEach(sub => {
      if ((state.CAT_GROUP[sub] || 'Other') !== group) return;
      (state.CAT_SKU_SEQ[sub] || []).forEach(sku => {
        if (!seen.has(sku)) { const p = visible.find(x => x.sku === sku); if (p) { out.push(p); seen.add(sku); } }
      });
    });
    return out;
  }
  const skuList = state.CAT_SKU_SEQ[cat] || [];
  return skuList.map(sku => visible.find(p => p.sku === sku)).filter(Boolean);
}

function getPrice(sku) {
  const p = state.pricing[sku];
  return (p && p > 0) ? p : null;
}

function formatPrice(sku) {
  const p = getPrice(sku);
  if (!p) return '';
  return '$' + p.toFixed(2);
}

function categoryIcon(label) {
  const l = (label || '').toLowerCase();
  if (/partition/.test(l))                                              return CAT_ICONS.partition;
  if (/locker/.test(l))                                                 return CAT_ICONS.locker;
  if (/shoe|storage|nesting/.test(l))                                   return CAT_ICONS.storage;
  if (/bath|washroom|restroom|toilet/.test(l))                          return CAT_ICONS.bath;
  if (/accessor/.test(l))                                               return CAT_ICONS.accessory;
  if (/chair|seat|stool|ergonomic|executive|conference|reception|guest|task|drafting|stack|fold|big and tall/.test(l))
                                                                        return CAT_ICONS.seat;
  return CAT_ICONS.folder;
}

// ── RENDER CATEGORIES (sidebar) ──────────────────────────────
// Two-tier tree: parent groups (collapsible headers) over their subcategories.
function renderCats() {
  const visible = getVisibleProducts();
  const visibleSkus = new Set(visible.map(p => p.sku));
  // distinct visible SKUs across a set of category labels (products can sit in several)
  const skuCount = labels => {
    const s = new Set();
    labels.forEach(l => (state.CAT_SKU_SEQ[l] || []).forEach(sku => { if (visibleSkus.has(sku)) s.add(sku); }));
    return s.size;
  };
  const parts = [];

  // "All categories" returns to the landing (home) view.
  parts.push(`<div class="cat-item${state.activeCat===HOME_VIEW?' active':''}" onclick="goHome()">
      <span>All categories</span>
    </div>`);
  // "All Products" spans every group, so it sits above the tree.
  parts.push(`<div class="cat-item${state.activeCat==='All Products'?' active':''}"
      onclick="setCat('All Products')">
      <span>All Products</span><span class="cat-count">${visible.length}</span>
    </div>`);
  parts.push(`<div class="sidebar-div"></div>`);

  // Bucket categories under their parent group, preserving CAT_ORDER within each group.
  const byGroup = {};
  state.CAT_ORDER.forEach(label => {
    const g = state.CAT_GROUP[label] || 'Other';
    (byGroup[g] = byGroup[g] || []).push(label);
  });

  const chev = '<svg class="grp-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>';

  state.GROUP_ORDER.forEach(g => {
    const subs = byGroup[g] || [];
    if (!subs.length) return;
    // keep a group open if the active subcategory lives inside it, or it's the active category view
    const isActiveGroup = state.activeCat === GROUP_PREFIX + g
                       || state.activeCat === GROUPALL_PREFIX + g;
    const containsActive = subs.includes(state.activeCat);
    const collapsed = state.collapsedGroups.has(g) && !containsActive && !isActiveGroup;
    parts.push(`<div class="grp-head${collapsed?' collapsed':''}${isActiveGroup?' active':''}" onclick="toggleGroup('${g.replace(/'/g,"\\'")}')">
        ${chev}<span class="grp-name">${escapeHtml(g)}</span><span class="grp-count">${skuCount(subs)}</span>
      </div>`);
    if (collapsed) return;
    subs.forEach(c => {
      const count = (state.CAT_SKU_SEQ[c] || []).filter(s => visibleSkus.has(s)).length;
      parts.push(`<div class="cat-item cat-sub${state.activeCat===c?' active':''}"
          onclick="setCat('${c.replace(/'/g,"\\'")}')">
          <span>${escapeHtml(c)}</span><span class="cat-count">${count}</span>
        </div>`);
    });
  });

  document.getElementById('catList').innerHTML = parts.join('');
}

// Collapse / expand a parent group in the sidebar.
function toggleGroup(g) {
  if (state.collapsedGroups.has(g)) state.collapsedGroups.delete(g);
  else state.collapsedGroups.add(g);
  renderCats();
}

// Drill-down: the subcategory cards inside a parent category (e.g. Washroom →
// Bobrick Bathroom Accessories + ASI Bathroom Accessories), with an "All <G>"
// card to view the whole group at once. Top landing stays parent-only.
function renderSubcatCards(group) {
  const grid = document.getElementById('prodGrid');
  grid.className = 'products-grid cat-grid';
  document.getElementById('crumbBack').style.display = 'inline-flex';
  document.getElementById('topTitle').textContent = group;

  const visible = getVisibleProducts();
  const visibleSkus = new Set(visible.map(p => p.sku));
  const subCount = sub => (state.CAT_SKU_SEQ[sub] || []).filter(sku => visibleSkus.has(sku)).length;
  const subs = state.CAT_ORDER.filter(sub =>
    (state.CAT_GROUP[sub] || 'Other') === group && subCount(sub) > 0);

  // distinct products across the whole group (for the All-<group> card)
  const groupSkus = new Set();
  subs.forEach(s => (state.CAT_SKU_SEQ[s] || []).forEach(sku => { if (visibleSkus.has(sku)) groupSkus.add(sku); }));
  const groupTotal = groupSkus.size;

  document.getElementById('resultCt').textContent =
    subs.length + ' subcategor' + (subs.length===1?'y':'ies');

  const arrow = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>';
  const card = (label, count, icon, target, isAll) => {
    const safe = target.replace(/'/g, "\\'");
    return `<div class="cat-card${isAll?' cat-card-all':''}" role="button" tabindex="0"
        onclick="setCat('${safe}')"
        onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setCat('${safe}')}">
        <div class="cat-card-icon">${icon}</div>
        <div class="cat-card-body">
          <div class="cat-card-name">${escapeHtml(label)}</div>
          <div class="cat-card-count">${count} product${count!==1?'s':''}</div>
        </div>
        <div class="cat-card-arrow">${arrow}</div>
      </div>`;
  };

  const head = `<div class="cat-landing-head">
      <span class="cat-landing-title">${escapeHtml(group)}</span>
      <span class="cat-landing-sub">${groupTotal} product${groupTotal!==1?'s':''} across ${subs.length} subcategor${subs.length===1?'y':'ies'}</span>
    </div>`;

  const cards = [ card('All ' + group, groupTotal, categoryIcon(group), GROUPALL_PREFIX + group, true) ];
  subs.forEach(s => cards.push(card(s, subCount(s), categoryIcon(s), s, false)));
  grid.innerHTML = head + cards.join('');
}

// Back button: step up one level rather than always jumping to the top landing.
function goBack() {
  if (state.search) {                       // clear an active search first
    state.search = '';
    const si = document.getElementById('srchInput'); if (si) si.value = '';
    renderCats(); renderProducts(); return;
  }
  const c = state.activeCat;
  if (c.startsWith(GROUPALL_PREFIX)) { setCat(GROUP_PREFIX + c.slice(GROUPALL_PREFIX.length)); return; }
  if (c.startsWith(GROUP_PREFIX))    { goHome(); return; }   // subcategory cards → top landing
  if (c === 'All Products')          { goHome(); return; }
  const g = state.CAT_GROUP[c];                              // a subcategory product view →
  if (g) { setCat(GROUP_PREFIX + g); return; }               //   up to its group's subcat cards
  goHome();
}

function setCat(c) {
  state.activeCat = c;
  renderCats(); renderProducts();
}

// Return to the category landing and clear any active search.
function goHome() {
  state.activeCat = HOME_VIEW;
  state.search = '';
  const si = document.getElementById('srchInput'); if (si) si.value = '';
  renderCats(); renderProducts();
}

// ── RENDER CATEGORY LANDING (added) ──────────────────────────
// The default view: a grid of category cards (name + count + icon), with an
// "All products" card first. Clicking a card reuses setCat() — the exact same
// filter the sidebar uses — so nothing downstream changes. No data is fetched.
function renderCategoryCards() {
  const grid = document.getElementById('prodGrid');
  grid.className = 'products-grid cat-grid';
  document.getElementById('crumbBack').style.display = 'none';
  document.getElementById('topTitle').textContent = 'Browse by category';

  const visible = getVisibleProducts();
  const visibleSkus = new Set(visible.map(p => p.sku));
  const totalCount = visible.length;

  // distinct visible products in a parent group (products can sit in several subcats)
  const groupCount = group => {
    const s = new Set();
    state.CAT_ORDER.forEach(sub => {
      if ((state.CAT_GROUP[sub] || 'Other') !== group) return;
      (state.CAT_SKU_SEQ[sub] || []).forEach(sku => { if (visibleSkus.has(sku)) s.add(sku); });
    });
    return s.size;
  };
  // only parent groups that actually have visible products in this catalog
  const groups = state.GROUP_ORDER.filter(g => groupCount(g) > 0);
  const nGroups = groups.length;

  document.getElementById('resultCt').textContent =
    nGroups + ' categor' + (nGroups===1?'y':'ies');

  const arrow = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>';
  // `target` is the value passed to setCat(): 'All Products' or 'group:<Name>'.
  const card = (label, count, icon, target, isAll) => {
    const safe = target.replace(/'/g, "\\'");
    return `<div class="cat-card${isAll?' cat-card-all':''}" role="button" tabindex="0"
        onclick="setCat('${safe}')"
        onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setCat('${safe}')}">
        <div class="cat-card-icon">${icon}</div>
        <div class="cat-card-body">
          <div class="cat-card-name">${escapeHtml(label)}</div>
          <div class="cat-card-count">${count} product${count!==1?'s':''}</div>
        </div>
        <div class="cat-card-arrow">${arrow}</div>
      </div>`;
  };

  if (!nGroups) {
    grid.innerHTML = `<div class="no-results">${CAT_ICONS.folder}<span>No categories in this catalog yet</span></div>`;
    return;
  }

  const head = `<div class="cat-landing-head">
      <span class="cat-landing-title">${escapeHtml(state.activeCatalog?.name || 'Catalog')}</span>
      <span class="cat-landing-sub">${totalCount} product${totalCount!==1?'s':''} across ${nGroups} categor${nGroups===1?'y':'ies'}</span>
    </div>`;

  const cards = [ card('All Products', totalCount, CAT_ICONS.all, 'All Products', true) ];
  groups.forEach(g => {
    cards.push(card(g, groupCount(g), categoryIcon(g), GROUP_PREFIX + g, false));
  });

  grid.innerHTML = head + cards.join('');
}

// ── RENDER PRODUCTS ──────────────────────────────────────────
// ── PER-PAGE SORT RULES ──────────────────────────────────────
// Maps a category (by its display name) to a sequencing rule. Anything NOT listed
// keeps its curated "Featured" order. Values: 'price_asc' (low→high) or 'price_desc'.
// To sequence another page, add a line here, e.g.  'Guest Seating': 'price_desc'.
const CAT_SORT = {
  'Office Chairs': 'price_asc',
};

function renderProducts() {
  const grid = document.getElementById('prodGrid');
  const q = state.search.toLowerCase();

  // Landing view: category cards (only when no search is active).
  if (state.activeCat === HOME_VIEW && !q) {
    renderCategoryCards();
    return;
  }

  // Drill-down view: a parent category's subcategory cards (no search active).
  if (state.activeCat.startsWith(GROUP_PREFIX) && !q) {
    renderSubcatCards(state.activeCat.slice(GROUP_PREFIX.length));
    return;
  }

  // Product / search view. On the landing, a search spans the whole catalog,
  // so HOME behaves like "All Products" for the purpose of building the list.
  grid.className = 'products-grid';
  const baseCat = (state.activeCat === HOME_VIEW) ? 'All Products' : state.activeCat;

  // Breadcrumb + title for the product view.
  document.getElementById('crumbBack').style.display = 'inline-flex';
  document.getElementById('topTitle').textContent =
    (state.activeCat === HOME_VIEW) ? 'Search results'
    : state.activeCat.startsWith(GROUPALL_PREFIX) ? state.activeCat.slice(GROUPALL_PREFIX.length)
    : state.activeCat.startsWith(GROUP_PREFIX) ? state.activeCat.slice(GROUP_PREFIX.length)
    : state.activeCat;

  let list = getProductsForCat(baseCat).filter(p =>
    !q || p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q) ||
    (p.categories||[]).some(c => c.toLowerCase().includes(q))
  );
  if (baseCat === 'All Products' && !q) {
    const seen = new Set(); const ord = [];
    state.CAT_ORDER.forEach(cat =>
      (state.CAT_SKU_SEQ[cat]||[]).forEach(sku => {
        if (!seen.has(sku)) {
          const p = list.find(x => x.sku===sku);
          if (p) { ord.push(p); seen.add(sku); }
        }
      })
    );
    list.forEach(p => { if (!seen.has(p.sku)) ord.push(p); });
    list = ord;
  }
  // Per-page sequencing: only categories listed in CAT_SORT are reordered;
  // every other page keeps its curated (Featured) order. Call-for-pricing goes last.
  const sortMode = CAT_SORT[state.activeCat];
  if (sortMode === 'price_asc' || sortMode === 'price_desc') {
    const dir = (sortMode === 'price_desc') ? -1 : 1;
    list = [...list].sort((a, b) => {
      const pa = getPrice(a.sku), pb = getPrice(b.sku);
      if (pa == null && pb == null) return 0;
      if (pa == null) return 1;
      if (pb == null) return -1;
      return (pa - pb) * dir;
    });
  }
  document.getElementById('resultCt').textContent = list.length + ' product' + (list.length!==1?'s':'');
  const showPricing = state.customer?.show_pricing !== false;
  const chairSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="10" width="16" height="4" rx="2"/><rect x="6" y="5" width="12" height="6" rx="2"/><line x1="7" y1="14" x2="7" y2="20"/><line x1="17" y1="14" x2="17" y2="20"/></svg>`;
  if (!list.length) {
    document.getElementById('prodGrid').innerHTML = `<div class="no-results">${chairSvg}<span>No products found</span></div>`;
    return;
  }
  const extIco = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
  const fileIco = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
  document.getElementById('prodGrid').innerHTML = list.map(p => {
    const img   = (p.images||[])[0] || '';
    const price = showPricing ? formatPrice(p.sku) : '';
    const nFiles = (p._assets||[]).length;
    const showExt = SHOW_EXTERNAL_LINKS && !!p.url;   // card's external-link icon (gated by master switch)
    return `<div class="prod-card" onclick="openDetail('${p.sku}')" tabindex="0" role="button">
      <div class="card-img" style="position:relative">
        ${img
          ? `<img src="${escapeHtml(img)}" alt="${escapeHtml(p.name)}" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="no-img">${chairSvg}</div>`}
        ${showExt ? `<a class="card-ext" href="${escapeHtml(p.url)}" target="_blank" rel="noopener"
          onclick="event.stopPropagation()" title="View product page">${extIco}</a>` : ''}
        ${nFiles ? `<span class="card-files" title="${nFiles} downloadable file${nFiles!==1?'s':''}">${fileIco}${nFiles}</span>` : ''}
      </div>
      <div class="card-body">
        <div class="card-sku">${escapeHtml(p.sku)}</div>
        <div class="card-name">${escapeHtml(p.name)}</div>
        <div class="card-footer">
          <span class="card-cat">${escapeHtml((p.categories||[])[0]||'')}</span>
          ${showPricing
            ? (price
                ? `<span class="card-price">${price}</span>`
                : `<span class="card-price card-price-cfp">Call</span>`)
            : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── PROJECTS ─────────────────────────────────────────────────
async function loadProjects() {
  // Model A: projects span catalogs. We no longer filter by the active catalog —
  // row-level security already limits results to this customer's catalogs, so a
  // plain select returns every project the user is entitled to, regardless of
  // which catalog they're currently browsing.
  const {data} = await sb.from('projects')
    .select('*')
    .order('updated_at', {ascending: false});
  state.projects = data || [];
  if (state.projects.length && !state.activeProjectId)
    state.activeProjectId = state.projects[0].id;
  renderProjList();
  if (state.activeProjectId) await loadBom();
}

function setStatusFilter(s) {
  state.statusFilter = s;
  document.querySelectorAll('.sf-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.status === s));
  renderProjList();
}

function renderProjList() {
  const q = (document.getElementById('projSrch')?.value||'').toLowerCase();
  let list = state.projects.filter(p => {
    const matchQ = !q || p.project_name.toLowerCase().includes(q) ||
      (p.project_number||'').toLowerCase().includes(q) ||
      (p.site_address||'').toLowerCase().includes(q) ||
      (p.general_contractor||'').toLowerCase().includes(q) ||
      (p.owner_name||'').toLowerCase().includes(q);
    const matchS = state.statusFilter==='all' || p.status===state.statusFilter;
    return matchQ && matchS;
  });
  const el = document.getElementById('projList');
  if (!list.length) {
    el.innerHTML = `<div class="proj-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      <p>${state.projects.length ? 'No projects match your search.' : 'No projects yet.\nClick + to create your first project.'}</p>
    </div>`;
    return;
  }
  el.innerHTML = list.map(p => `
    <div class="proj-card${p.id===state.activeProjectId?' active-proj':''}"
      onclick="selectProject('${p.id}')">
      <div class="proj-card-name">${escapeHtml(p.project_name)}</div>
      <div class="proj-card-meta">
        <span class="status-pill status-${p.status}">${statusLabel(p.status)}</span>
        ${state.catalogs.length > 1 ? `<span class="status-pill" style="background:var(--accbg);color:var(--acctxt)" title="Project's home catalog">${escapeHtml((state.catalogs.find(c=>c.id===p.catalog_id)||{}).name||'')}</span>` : ''}
        ${p.project_number ? `<span>#${escapeHtml(p.project_number)}</span>` : ''}
        ${p.owner_name     ? `<span>👤 ${escapeHtml(p.owner_name)}</span>` : ''}
        ${p.site_address   ? `<span>📍 ${escapeHtml(p.site_address)}</span>` : ''}
        ${p.material_order_by ? `<span>📦 by ${new Date(p.material_order_by).toLocaleDateString('en-CA')}</span>` : ''}
        <span>${new Date(p.updated_at).toLocaleDateString('en-CA')}</span>
      </div>
    </div>`).join('');
}

async function selectProject(id) {
  state.activeProjectId = id;

  await loadBom();
  switchRTab('bom');
